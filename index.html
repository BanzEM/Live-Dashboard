<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href=
"https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" 
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Transaction Dashboard</title>
</head>
<body>
 

 <div class="flex min-h-screen">
    <div class="w-64 bg-white border-r border-gray-200 p-5 shadow-sm">
        <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8 text-left">menu</h5>
    </div>
 

<div class="flex-1 p-8 ml-5">

<div class="flex gap-6 mb-8">


<div class="flex-1 bg-white rounded-2xl p-6 shadow-md border border-gray-200" >
    <h6 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8 text-center">Total Transactions</h6>
    <p class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8 text-center" id="transaction_count"></p>
</div>
   
<div class="flex-1 bg-white rounded-2xl p-6 shadow-md border border-gray-200" >
    <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8 text-center">Pending</h5>
    <p class="text-body" id="Pending_transaction"></p>
</div>

    
<div class="flex-1 bg-white rounded-2xl p-6 shadow-md border border-gray-200" >
    <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8 text-center">Successful</h5>
    <p class="text-body" id="Successful_transactions"></p>
</div>

</div>


<div class="bg-white rounded-2xl p-6  shadow-md border border-gray-200">
<form class="max-w-md mx-auto relative w-full">   
    <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only ">Search</label>
    <div class="relative">
        <input type="search" id="search" class="block pr-28 w-full p-3 ps-9 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Search" required />
        <button 
        type="button" 
        class="absolute right-1.5 top-1/2 -translate-y-1/2 text-white bg-blue-600 hover:bg-blue-700 -mt-4 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2  focus:outline-none shadow-sm transition-colors"
    >
        Search
    </button>
    </div>
</form>

<div class="mb-6"></div>

    <table class="w-full border h-auto rounded-lg"  id="transaction-table">
        <thead>
          <tr>
            <th scope="col" class="text-left px-4 py-3">Transaction Id</th>
            <th scope="col" class="text-left px-4 py-3">Transaction</th>
            <th scope="col" class="text-left px-4 py-3">Amount</th>
            <th scope="col" class="text-left px-4 py-3">Date</th>
            <th scope="col" class="text-left px-4 py-3">Status</th>
          </tr>
        </thead>
        <tbody id="json-output">

        </tbody>
      
    </table>
</div>
 </div>
  </div>
</div>
</div>
</div>

</div>

  
  <script src="script.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
</body>
</html>
